<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // SPA Fallback: Redirect 404s to root with the path as a query param or hash
        // This is a backup method if Vercel rewrites fail
        sessionStorage.setItem('redirect', location.href);
        location.replace('/');
    </script>
</head>
<body>
</body>
</html>
